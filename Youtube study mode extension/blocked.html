<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back to Focus - Study Mode</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.4s ease;
    }

    /* Light Mode */
    body.light {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
    }

    /* Dark Mode */
    body.dark {
      background: linear-gradient(135deg, #1e2937 0%, #334155 100%);
      color: #e2e8f0;
    }

    .container {
      max-width: 520px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 32px;
      padding: 48px 36px;
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      transition: all 0.4s ease;
    }

    body.dark .container {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .icon {
      font-size: 92px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      opacity: 0.95;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 32px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: white;
      color: #4f46e5;
    }

    body.dark .btn-primary {
      background: #e0e7ff;
      color: #1e2937;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }

    body.dark .btn-secondary {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }
  </style>
</head>
<body class="light">
  <div class="container">
    <div class="icon">📚</div>
    <h1>Back to Focus</h1>
    <p>Your study session is active. Let's protect your focus and finish what you started.</p>
    
    <div class="actions">
      <a href="https://www.youtube.com/" class="btn btn-primary">Go to YouTube Home</a>
      <button id="endSessionBtn" class="btn btn-secondary">End Study Session</button>
    </div>
  </div>

  <script>
    const endBtn = document.getElementById('endSessionBtn');
    
    // Auto detect dark mode for blocked page
    function applyDarkMode() {
      chrome.storage.local.get(['darkMode'], (data) => {
        const isDark = data.darkMode !== undefined ? data.darkMode : 
                      window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        document.body.classList.toggle('dark', isDark);
        document.body.classList.toggle('light', !isDark);
      });
    }

    chrome.storage.local.get(['isStudying'], (data) => {
      if (data.isStudying) {
        endBtn.textContent = "End Study Session";
        endBtn.onclick = () => {
          chrome.storage.local.set({ isStudying: false }, () => {
            window.location.href = 'https://www.youtube.com/';
          });
        };
      } else {
        endBtn.textContent = "Continue to YouTube";
        endBtn.onclick = () => window.location.href = 'https://www.youtube.com/';
      }
    });

    // Apply dark mode
    applyDarkMode();
  </script>
</body>
</html>
