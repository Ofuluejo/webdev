<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:        #ff4d6b;
      --pink-light:  #ff7da0;
      --coral:       #ff7055;
      --gray-bg:     #f0f0f0;
      --gray-text:   #999;
      --text:        #1a1a1a;
      --radius-card: 2rem;
      --shadow:      0 30px 80px rgba(0, 0, 0, 0.14);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #e9e9e9;
      background-image:
        radial-gradient(ellipse at 20% 80%, rgba(255, 107, 157, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 77, 107, 0.10) 0%, transparent 50%);
    }

    /* ── Utility ──────────────────────────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); border: 0;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .auth-card {
      width: 100%;
      max-width: 1080px;
      min-height: 580px;
      background: #fff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      display: flex;
      overflow: hidden;
      animation: cardRise 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Left panel ───────────────────────────────────────────── */
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 3.5rem;
      gap: 0; /* controlled per-element */
    }

    /* staggered fade-up animations */
    .left-panel > * { animation: fadeUp 0.5s ease-out both; }
    .left-panel > *:nth-child(1) { animation-delay: 0.15s; }
    .left-panel > *:nth-child(2) { animation-delay: 0.22s; }
    .left-panel > *:nth-child(3) { animation-delay: 0.29s; }
    .left-panel > *:nth-child(4) { animation-delay: 0.36s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .left-panel h1 {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    /* Social row */
    .social-row {
      display: flex;
      gap: 0.9rem;
      margin-bottom: 1.125rem;
    }

    .social-btn {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      border: 1.5px solid #e2e2e2;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .social-btn:hover {
      border-color: #bbb;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    .social-btn:active { transform: translateY(0); }

    /* Divider */
    .divider-text {
      font-size: 0.8125rem;
      color: var(--gray-text);
      margin-bottom: 1.25rem;
    }

    /* Form */
    .form-wrap { width: 100%; animation: fadeUp 0.5s 0.36s ease-out both; }

    .field-group { position: relative; margin-bottom: 0.875rem; }

    .input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: var(--gray-bg);
      border: 1.5px solid transparent;
      border-radius: 0.6rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      color: #333;
      transition: background 0.2s, border-color 0.2s;
    }

    .input::placeholder { color: #bbb; }

    .input:focus {
      outline: none;
      background: #e8e8e8;
      border-color: #d8d8d8;
    }

    .input.has-icon { padding-right: 3rem; }

    /* Error state */
    .input.error {
      background: #fff0f2;
      border-color: #ffccd3;
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-5px); }
      40%,80%  { transform: translateX(5px); }
    }

    .field-msg {
      font-size: 0.75rem;
      color: #ff4d6b;
      margin-top: 0.3rem;
      padding-left: 0.25rem;
      display: none;
    }

    .field-msg.visible { display: block; }

    /* Eye toggle */
    .eye-toggle {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #c0c0c0;
      transition: color 0.2s;
      padding: 0.2rem;
      display: flex;
      align-items: center;
    }

    .eye-toggle:hover { color: #888; }

    /* Forgot link */
    .forgot-link {
      display: block;
      text-align: center;
      font-size: 0.8125rem;
      color: #aaa;
      text-decoration: none;
      margin: 0.75rem 0 1.375rem;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: #666; }

    /* Sign-in button */
    .btn-signin {
      width: 100%;
      padding: 0.95rem 2rem;
      border: none;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--coral) 100%);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn-signin::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-signin:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 77, 107, 0.40);
    }

    .btn-signin:hover::after { opacity: 1; }
    .btn-signin:active { transform: translateY(0); box-shadow: none; }

    .btn-signin.success {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      box-shadow: 0 8px 24px rgba(39, 174, 96, 0.35);
    }

    .btn-signin.loading { opacity: 0.75; pointer-events: none; }

    /* ── Right panel ──────────────────────────────────────────── */
    .right-panel {
      flex: 1;
      background: linear-gradient(145deg, #ff4d6b 0%, #ff6b9a 55%, #ff85b3 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.75rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-radius: 0 var(--radius-card) var(--radius-card) 0;
      animation: panelSlide 0.7s 0.12s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes panelSlide {
      from { opacity: 0; transform: translateX(35px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Decorative blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      pointer-events: none;
    }

    .blob-1 { width: 320px; height: 320px; top: -100px; right: -100px; }
    .blob-2 { width: 220px; height: 220px; bottom: -80px; left:  -70px; }
    .blob-3 { width:  90px; height:  90px; top: 44%; left: 10%; opacity: 0.06; }

    .right-panel h2 {
      font-size: 3.25rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.1rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.55s 0.5s ease-out both;
    }

    .right-panel p {
      font-size: 0.9375rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.75;
      max-width: 275px;
      margin-bottom: 2.25rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.55s 0.6s ease-out both;
    }

    .btn-signup {
      padding: 0.9rem 3.25rem;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 100px;
      background: transparent;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, box-shadow 0.25s, transform 0.2s;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.55s 0.7s ease-out both;
    }

    .btn-signup:hover {
      background: #fff;
      color: var(--pink);
      box-shadow: 0 8px 28px rgba(0,0,0,0.16);
      transform: translateY(-2px);
    }

    .btn-signup:active { transform: translateY(0); box-shadow: none; }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 760px) {
      body { padding: 1rem; align-items: flex-start; padding-top: 2rem; }

      .auth-card {
        flex-direction: column;
        min-height: unset;
        border-radius: 1.5rem;
      }

      .left-panel {
        padding: 2.25rem 1.75rem 1.75rem;
      }

      .left-panel h1 { font-size: 2rem; margin-bottom: 1.25rem; }

      .right-panel {
        padding: 2.5rem 2rem;
        border-radius: 0 0 1.5rem 1.5rem;
        min-height: 260px;
      }

      .right-panel h2 { font-size: 2.25rem; }
      .right-panel p  { font-size: 0.875rem; margin-bottom: 1.75rem; }
    }

    @media (max-width: 400px) {
      .left-panel { padding: 2rem 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="auth-card" role="main">

    <!-- ── LEFT: Sign In ──────────────────────────────────────── -->
    <div class="left-panel">

      <h1>Sign in</h1>

      <!-- Social buttons -->
      <div class="social-row" aria-label="Sign in with social accounts">
        <!-- Facebook -->
        <button class="social-btn" type="button" aria-label="Continue with Facebook">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true">
            <path d="M24 12.073c0-6.627-5.373-12-12-12S0 5.446 0 12.073c0
              5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0
              -3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953
              H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796
              v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>

        <!-- Google -->
        <button class="social-btn" type="button" aria-label="Continue with Google">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92
              c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77
              c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84
              C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43
              .35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15
              C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84
              c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </button>

        <!-- LinkedIn -->
        <button class="social-btn" type="button" aria-label="Continue with LinkedIn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="#0A66C2" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852
              -3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046
              c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337
              7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0
              2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9
              h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24
              1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </button>
      </div>

      <span class="divider-text">or use your account</span>

      <!-- Form -->
      <form class="form-wrap" id="signInForm" novalidate>

        <!-- Email -->
        <div class="field-group">
          <label class="sr-only" for="email">Email address</label>
          <input
            class="input"
            type="email"
            id="email"
            name="email"
            placeholder="Email"
            autocomplete="email"
            aria-required="true"
            aria-describedby="emailMsg"
          />
          <p class="field-msg" id="emailMsg" role="alert"></p>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="sr-only" for="password">Password</label>
          <input
            class="input has-icon"
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            aria-required="true"
            aria-describedby="passwordMsg"
          />
          <!-- toggle eye -->
          <button
            type="button"
            class="eye-toggle"
            id="eyeToggle"
            aria-label="Toggle password visibility"
          >
            <!-- eye open -->
            <svg id="eyeOpen" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <!-- eye closed (hidden) -->
            <svg id="eyeClosed" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true" style="display:none">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
          <p class="field-msg" id="passwordMsg" role="alert"></p>
        </div>

        <a href="#" class="forgot-link" tabindex="0">Forgot your password?</a>

        <button type="submit" class="btn-signin" id="signInBtn">Sign In</button>

      </form>
    </div>

    <!-- ── RIGHT: Welcome ─────────────────────────────────────── -->
    <div class="right-panel" aria-label="Sign up invitation">
      <!-- Decorative blobs -->
      <div class="blob blob-1" aria-hidden="true"></div>
      <div class="blob blob-2" aria-hidden="true"></div>
      <div class="blob blob-3" aria-hidden="true"></div>

      <h2>Hello,&nbsp;Friend!</h2>
      <p>Enter your personal details and start your journey with us</p>
      <button class="btn-signup" type="button" id="signUpBtn">Sign Up</button>
    </div>

  </div>

  <script>
    /* ── Password visibility toggle ──────────────────────────── */
    const eyeToggle  = document.getElementById('eyeToggle');
    const pwInput    = document.getElementById('password');
    const eyeOpen    = document.getElementById('eyeOpen');
    const eyeClosed  = document.getElementById('eyeClosed');

    eyeToggle.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type           = isHidden ? 'text' : 'password';
      eyeOpen.style.display  = isHidden ? 'none' : 'block';
      eyeClosed.style.display = isHidden ? 'block' : 'none';
      eyeToggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    /* ── Validation helpers ───────────────────────────────────── */
    function showError(inputEl, msgEl, text) {
      inputEl.classList.add('error');
      msgEl.textContent = text;
      msgEl.classList.add('visible');
      // re-trigger shake
      inputEl.style.animation = 'none';
      requestAnimationFrame(() => {
        inputEl.style.animation = '';
      });
    }

    function clearError(inputEl, msgEl) {
      inputEl.classList.remove('error');
      msgEl.textContent = '';
      msgEl.classList.remove('visible');
    }

    /* Live-clear errors on typing */
    document.getElementById('email').addEventListener('input', function () {
      clearError(this, document.getElementById('emailMsg'));
    });
    pwInput.addEventListener('input', function () {
      clearError(this, document.getElementById('passwordMsg'));
    });

    /* ── Form submission ──────────────────────────────────────── */
    const form      = document.getElementById('signInForm');
    const signInBtn = document.getElementById('signInBtn');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const emailEl    = document.getElementById('email');
      const emailMsg   = document.getElementById('emailMsg');
      const pwMsg      = document.getElementById('passwordMsg');
      const emailVal   = emailEl.value.trim();
      const pwVal      = pwInput.value;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      let valid = true;

      if (!emailVal) {
        showError(emailEl, emailMsg, 'Please enter your email address.');
        valid = false;
      } else if (!emailRegex.test(emailVal)) {
        showError(emailEl, emailMsg, 'Please enter a valid email address.');
        valid = false;
      } else {
        clearError(emailEl, emailMsg);
      }

      if (!pwVal) {
        showError(pwInput, pwMsg, 'Please enter your password.');
        valid = false;
      } else if (pwVal.length < 6) {
        showError(pwInput, pwMsg, 'Password must be at least 6 characters.');
        valid = false;
      } else {
        clearError(pwInput, pwMsg);
      }

      if (!valid) return;

      /* Simulate async sign-in */
      signInBtn.classList.add('loading');
      signInBtn.textContent = 'Signing in…';

      setTimeout(() => {
        signInBtn.classList.remove('loading');
        signInBtn.classList.add('success');
        signInBtn.textContent = '✓ Welcome back!';
      }, 1300);
    });

    /* ── Sign Up button ───────────────────────────────────────── */
    document.getElementById('signUpBtn').addEventListener('click', () => {
      // Could navigate to /signup — alert for demo
      alert('Redirecting to Sign Up…');
    });
  </script>
</body>
</html>
